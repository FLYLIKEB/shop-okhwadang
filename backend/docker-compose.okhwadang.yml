services:
  mysql:
    image: mysql:8.0
    container_name: okhwadang-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: commerce
    ports:
      - "127.0.0.1:3308:3306"
    volumes:
      - okhwadang_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: okhwadang-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - okhwadang_redis_data:/data

volumes:
  okhwadang_mysql_data:
  okhwadang_redis_data:
