name: Deploy Backend

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Deploy to EC2
        env:
          BACKEND_ENV_PRODUCTION: ${{ secrets.BACKEND_ENV_PRODUCTION }}
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
        run: |
          cd /app/shop-okhwadang/shop-okhwadang/backend

          # git pull
          git fetch origin main
          git reset --hard origin/main

          # restore .env (.gitignored) — dotenv/config 가 런타임에 로드
          printf '%s' "$BACKEND_ENV_PRODUCTION" > .env
          chmod 600 .env

          # restore JWT RSA keys (.gitignored)
          mkdir -p keys
          printf '%s' "$JWT_PRIVATE_KEY" > keys/jwt-private.pem
          printf '%s' "$JWT_PUBLIC_KEY" > keys/jwt-public.pem
          chmod 600 keys/jwt-private.pem keys/jwt-public.pem

          # install dependencies (빌드엔 devDeps 필요 — @types/*, @nestjs/cli 등)
          npm ci

          # build
          npm run build

          # run migration (NODE_ENV=production 으로 dist glob 사용)
          set -a
          . ./.env
          set +a
          NODE_ENV=production npm run migration:run:prod

          # prune devDeps (빌드 완료 후 node_modules 슬림화)
          npm prune --omit=dev

          # restart pm2
          pm2 restart commerce --update-env || pm2 start dist/main.js --name commerce
          pm2 save

      - name: Smoke test
        run: |
          sleep 20
          # self-hosted runner 가 EC2 내부에서 도는 전제 → localhost 로 점검
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed! HTTP status: $STATUS"
            exit 1
          fi
          echo "Smoke test passed"
