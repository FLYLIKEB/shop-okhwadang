name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Save deployment commit
        run: echo $(git rev-parse HEAD) > .deployment_commit
      - name: Deploy to EC2
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /app/shop-okhwadang/backend
            git pull origin main
            npm ci --omit=dev
            npm run build
            npm run migration:run:prod
            pm2 startOrReload ecosystem.config.js --env production
      - name: Smoke test
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.EC2_HOST }}/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed! HTTP status: $STATUS"
            exit 1
          fi
          echo "Smoke test passed"
