name: Deploy Backend

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Deploy to EC2
        run: |
          cd /app/shop-okhwadang/shop-okhwadang/backend
          
          # git pull
          git fetch origin main
          git reset --hard origin/main
          
          # install dependencies
          npm ci --omit=dev
          
          # build
          npm run build
          
          # run migration
          npm run migration:run:prod
          
          # restart pm2
          pm2 restart commerce || pm2 start dist/main.js --name commerce
          pm2 save

      - name: Smoke test
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:3000/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed! HTTP status: $STATUS"
            exit 1
          fi
          echo "Smoke test passed"
